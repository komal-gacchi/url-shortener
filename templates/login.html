<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - URL Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0e27] h-screen flex items-center justify-center font-sans p-4">
    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl max-w-md w-full space-y-6 border border-gray-700">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-white tracking-tight">Welcome Back</h1>
            <p class="text-gray-400 text-sm mt-1">Log in to view your dashboard analytics</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="text-sm p-3 rounded-lg border {% if category == 'success' %} bg-emerald-950/40 text-emerald-400 border-emerald-800 {% else %} bg-red-950/40 text-red-400 border-red-900 {% endif %}">
                  {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase text-gray-400 mb-1 tracking-wider">Email Address</label>
                <input type="email" name="email" required placeholder="name@example.com" class="w-full px-4 py-2.5 bg-gray-700 border border-gray-600 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-gray-500 transition">
            </div>
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-xs font-semibold uppercase text-gray-400 tracking-wider">Password</label>
                    <a href="/forgot-password" class="text-xs text-indigo-400 hover:underline">Forgot Password?</a>
                </div>
                <input type="password" name="password" required placeholder="••••••••" class="w-full px-4 py-2.5 bg-gray-700 border border-gray-600 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-gray-500 transition">
            </div>
            
            <button type="submit" class="w-full bg-[#6366f1] text-white py-3 rounded-lg font-medium hover:bg-indigo-700 shadow-lg hover:shadow-indigo-500/20 transition-all duration-200 pt-2">Sign In</button>
        </form>

        <div class="text-center pt-4 border-t border-gray-700">
            <p class="text-sm text-gray-400">Don't have an account? <a href="/register" class="text-indigo-400 font-medium hover:underline">Register</a></p>
        </div>
    </div>
</body>
</html>
