<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quickly Link - Login Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b0e27] min-h-screen flex flex-col justify-center items-center p-4 font-sans">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-indigo-950 p-6 sm:p-8 space-y-6">
        <div class="text-center space-y-1">
            <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mx-auto text-xl shadow-sm">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight mt-2">Welcome Back</h1>
            <p class="text-xs text-gray-400">Log in to handle your active asset link configurations.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="p-3.5 text-xs rounded-xl font-medium border bg-red-50 text-red-700 border-red-100">
                <i class="fa-solid fa-triangle-exclamation mr-1"></i> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5">Registered Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 text-sm"><i class="fa-regular fa-envelope"></i></span>
                    <input type="email" name="email" required placeholder="name@domain.com" 
                           class="w-full p-3 pl-10 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50/50">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-400">Account Password</label>
                    <a href="/forgot-password" class="text-xs text-indigo-600 font-semibold hover:underline">Forgot?</a>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 text-sm"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="password" required placeholder="••••••••" 
                           class="w-full p-3 pl-10 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50/50">
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition shadow-md mt-2 text-sm">
                Access Account Instance
            </button>
        </form>

        <div class="text-center border-t border-gray-100 pt-4 text-xs text-gray-400">
            Don't have a secure workspace? <a href="/register" class="text-indigo-600 font-bold hover:underline">Register Here</a>
        </div>
    </div>

</body>
</html>
