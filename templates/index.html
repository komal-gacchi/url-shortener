<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#f4f6fa] dark:bg-[#0f172a] text-gray-800 dark:text-gray-100 min-h-screen font-sans transition-colors duration-200">

    <nav class="bg-[#0b0e27] dark:bg-[#020617] text-white px-4 sm:px-8 py-4 flex flex-col sm:flex-row justify-between items-center shadow-md gap-4">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-indigo-600/10 border border-indigo-500/30 text-indigo-400 rounded-xl flex items-center justify-center text-lg shadow-sm">
                <i class="fa-solid fa-link"></i>
            </div>
            <div>
                <span class="text-lg font-bold tracking-tight block">Quickly Link</span>
                <span class="text-[10px] text-gray-400 font-mono block -mt-1">v2.1.0-prod</span>
            </div>
        </div>
        
        <div class="flex items-center gap-3 w-full sm:w-auto justify-end flex-wrap">
            <span class="text-sm bg-slate-800/40 border border-slate-700/50 px-3 py-1.5 rounded-lg text-gray-300 font-medium">
                Hi, <span class="font-bold text-indigo-400 font-mono">{{ user.username }}</span>
            </span>
            
            {% if user.is_admin %}
            <a href="/admin" class="bg-amber-600 hover:bg-amber-700 text-white text-xs font-semibold px-4 py-2 rounded-lg transition shadow-md inline-flex items-center gap-1">
                <i class="fa-solid fa-user-shield"></i> Admin Panel
            </a>
            {% endif %}
            
            <a href="/logout" class="bg-red-500/10 hover:bg-red-500 hover:text-white text-red-400 border border-red-500/20 px-4 py-2 rounded-lg text-xs font-semibold transition inline-flex items-center gap-1">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 sm:p-6 space-y-6">
        
        <section class="bg-white dark:bg-[#1e293b] rounded-2xl shadow-xl border border-gray-100 dark:border-gray-800 p-5 sm:p-8 space-y-6">
            <div>
                <h2 class="text-xl font-bold tracking-tight">Shorten a New Long URL</h2>
                <p class="text-xs text-gray-400 dark:text-gray-400 mt-0.5">Deploy instantaneous redirect proxies globally.</p>
            </div>

            <form id="shortenForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-1">Destination URL *</label>
                    <input type="url" id="longUrl" required placeholder="https://example.com/deep-target-path" 
                           class="w-full p-3 border border-gray-200 dark:border-gray-700 bg-gray-50/50 dark:bg-[#0f172a]/50 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-1">Custom Alias (Optional)</label>
                        <input type="text" id="customAlias" placeholder="e.g. bio-link" 
                               class="w-full p-3 border border-gray-200 dark:border-gray-700 bg-gray-50/50 dark:bg-[#0f172a]/50 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-1">Access Password (Optional)</label>
                        <input type="password" id="linkPassword" placeholder="Passphrase protection" 
                               class="w-full p-3 border border-gray-200 dark:border-gray-700 bg-gray-50/50 dark:bg-[#0f172a]/50 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-1">Activation Window Start</label>
                        <input type="datetime-local" id="startDate" 
                               class="w-full p-3 border border-gray-200 dark:border-gray-700 bg-gray-50/50 dark:bg-[#0f172a]/50 rounded-xl text-sm text-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-1">Expiration Deadline</label>
                        <input type="datetime-local" id="expiryDate" 
                               class="w-full p-3 border border-gray-200 dark:border-gray-700 bg-gray-50/50 dark:bg-[#0f172a]/50 rounded-xl text-sm text-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>

                <button type="submit" class="w-full bg-[#6366f1] hover:bg-indigo-700 text-white font-medium py-3 rounded-xl transition shadow-md flex items-center justify-center gap-2 pt-2">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Shorten URL Instance
                </button>
            </form>

            <div id="successAlert" class="hidden p-4 bg-emerald-50 dark:bg-emerald-950/20 border border-emerald-100 dark:border-emerald-900/40 rounded-xl flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                <div class="min-w-0 w-full">
                    <span class="text-[10px] font-bold uppercase tracking-wider text-emerald-600 block">Link Synced Successfully!</span>
                    <a id="resultLink" href="#" target="_blank" class="text-sm font-semibold text-indigo-600 dark:text-indigo-400 font-mono truncate block underline mt-0.5"></a>
                </div>
                <button onclick="navigator.clipboard.writeText(document.getElementById('resultLink').innerText); alert('Copied to system clipboard!');" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold py-2.5 px-4 rounded-xl transition">
                    <i class="fa-regular fa-copy"></i> Copy Link
                </button>
            </div>
        </section>

        <section class="bg-white dark:bg-[#1e293b] rounded-2xl shadow-xl border border-gray-100 dark:border-gray-800 overflow-hidden">
            <div class="p-5 sm:p-6 border-b border-gray-100 dark:border-gray-800 flex items-center gap-2">
                <span class="text-indigo-500"><i class="fa-solid fa-chart-line"></i></span>
                <h3 class="text-sm font-bold uppercase tracking-wider text-gray-400">Shortened Metrics Index</h3>
            </div>

            <div class="overflow-x-auto w-full">
                <table class="w-full text-left border-collapse min-w-[500px] md:min-w-full">
                    <thead>
                        <tr class="bg-gray-50 dark:bg-[#141b2e] border-b border-gray-100 dark:border-gray-800 text-[11px] font-bold uppercase tracking-wider text-gray-400">
                            <th class="p-4 sm:p-5">Routing Information</th>
                            <th class="p-4 sm:p-5">Usage</th>
                            <th class="p-4 sm:p-5 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="linksTableBody" class="divide-y divide-gray-100 dark:divide-gray-800 text-sm">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const shortenForm = document.getElementById('shortenForm');
        const successAlert = document.getElementById('successAlert');
        const resultLink = document.getElementById('resultLink');
        const linksTableBody = document.getElementById('linksTableBody');

        async function loadLinks() {
            const response = await fetch('/api/links');
            const links = await response.json() || [];
            linksTableBody.innerHTML = '';
            
            if(links.length === 0) {
                linksTableBody.innerHTML = `<tr><td colspan="3" class="text-center text-gray-400 p-8 text-xs">No active proxy links deployment records found.</td></tr>`;
                return;
            }

            links.forEach(link => {
                const row = document.createElement('tr');
                row.className = "hover:bg-gray-50/50 dark:hover:bg-[#151f32]/30 transition";
                row.innerHTML = `
                    <td class="p-4 sm:p-5 max-w-[180px] sm:max-w-xs">
                        <div class="space-y-0.5">
                            <a href="${link.short_url}" target="_blank" class="font-mono text-sm font-bold text-indigo-600 dark:text-indigo-400 break-all hover:underline block">${link.short_url}</a>
                            <p class="text-xs text-gray-400 truncate">Target: ${link.original_url}</p>
                            <span class="inline-block text-[10px] text-gray-400 font-mono bg-gray-50 dark:bg-gray-800 px-1 py-0.5 rounded">${link.created_at}</span>
                        </div>
                    </td>
                    <td class="p-4 sm:p-5 whitespace-nowrap">
                        <div>
                            <span class="block text-[10px] font-bold text-gray-400 uppercase">Hits</span>
                            <span class="font-mono text-sm font-bold text-indigo-500"><i class="fa-solid fa-chart-simple text-[10px]"></i> ${link.clicks}</span>
                        </div>
                    </td>
                    <td class="p-4 sm:p-5 text-right whitespace-nowrap">
                        <button onclick="deleteLink(${link.id})" class="px-3 py-1.5 bg-red-50 hover:bg-red-100 dark:bg-red-950/20 dark:hover:bg-red-950/40 text-red-500 rounded-lg text-xs font-semibold border border-red-100 dark:border-red-900/30 inline-flex items-center gap-1">
                            <i class="fa-regular fa-trash-can"></i> Delete
                        </button>
                    </td>
                `;
                linksTableBody.appendChild(row);
            });
        }

        shortenForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = document.getElementById('longUrl').value;
            const alias = document.getElementById('customAlias').value;
            const start_date = document.getElementById('startDate').value || null;
            const expiry_date = document.getElementById('expiryDate').value || null;
            const password = document.getElementById('linkPassword').value || null;

            const response = await fetch('/api/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, alias, start_date, expiry_date, password })
            });
            const data = await response.json();
            if (response.ok) {
                resultLink.href = data.short_url; resultLink.textContent = data.short_url;
                successAlert.classList.remove('hidden'); shortenForm.reset(); loadLinks();
            } else { alert(data.error); }
        });

        async function deleteLink(id) {
            if (confirm("Permanently wipe this routing entry node?")) {
                await fetch(`/api/links/${id}`, { method: 'DELETE' });
                loadLinks();
            }
        }
        window.onload = loadLinks;
    </script>
</body>
</html>
