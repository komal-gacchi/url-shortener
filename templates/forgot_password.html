<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-xl shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-6 text-center">Reset Password</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="p-3 mb-4 text-sm text-red-700 bg-red-100 rounded-lg dark:bg-red-900/30 dark:text-red-300">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/forgot-password" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Your Registered Email</label>
                <input type="email" name="email" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white dark:border-gray-700 focus:outline-none" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Your Secret Answer (Lowercase)</label>
                <input type="text" name="security_answer" placeholder="Answer you set during registration" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white dark:border-gray-700 focus:outline-none" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Enter New Password</label>
                <input type="password" name="new_password" placeholder="At least 8 characters" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white dark:border-gray-700 focus:outline-none" required>
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-2 rounded font-medium transition">Reset & Login</button>
        </form>
    </div>
</body>
</html>
