<div class="overflow-x-auto w-full">
    <table class="w-full text-left border-collapse min-w-[600px] md:min-w-full">
        <thead>
            <tr class="bg-gray-50/20 border-b border-gray-100 dark:border-gray-800 text-xs font-bold text-gray-400 uppercase">
                <th class="p-4">S.No</th> <th class="p-4">Username</th>
                <th class="p-4">Email</th>
                <th class="p-4">Role</th>
                <th class="p-4 text-right">Actions</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100 dark:divide-gray-800 text-sm">
            {% for user in users %}
            <tr class="hover:bg-gray-50/40 dark:hover:bg-[#162238]/40 transition">
                <td class="p-4 font-mono text-indigo-500 font-semibold">#{{ loop.index }}</td>
                <td class="p-4 font-semibold">{{ user.username }}</td>
                <td class="p-4 font-mono text-xs text-gray-400">{{ user.email }}</td>
                <td class="p-4">
                    {% if user.is_admin %}
                    <span class="bg-amber-50 dark:bg-amber-950/40 text-amber-700 dark:text-amber-400 text-[10px] font-bold px-2 py-0.5 rounded border border-amber-200">Admin</span>
                    {% else %}
                    <span class="bg-gray-100 dark:bg-gray-800 text-gray-400 text-[10px] font-bold px-2 py-0.5 rounded">User</span>
                    {% endif %}
                </td>
                <td class="p-4 text-right">
                    {% if user.id != current_user.id %}
                    <form action="/admin/delete-user/{{ user.id }}" method="POST" class="inline" onsubmit="return confirm('Drop {{ user.username }} node permanently?');">
                        <button type="submit" class="px-2.5 py-1.5 bg-transparent hover:bg-red-50 text-red-500 rounded-lg text-xs font-semibold transition border border-transparent hover:border-red-100">Delete</button>
                    </form>
                    {% else %}
                    <span class="text-sm text-gray-400 italic pr-2">Self Account</span>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
