<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protected Link - Authentication Required</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#f4f6fa] dark:bg-[#0f172a] text-gray-800 dark:text-gray-100 min-h-screen flex items-center justify-center font-sans p-4">

    <div class="bg-white dark:bg-[#1e293b] w-full max-w-md p-8 rounded-xl shadow-lg border border-gray-100 dark:border-gray-800 space-y-6 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-50 dark:bg-indigo-950/50 rounded-full text-indigo-600 dark:text-indigo-400 text-2xl shadow-sm mb-2 animate-bounce">
            <i class="fa-solid fa-lock"></i>
        </div>
        
        <div>
            <h1 class="text-xl font-bold tracking-tight">Encrypted Link Protected</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">This URL requires a password to open and access the target destination.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="p-3 bg-red-50 dark:bg-red-950/30 text-red-700 dark:text-red-400 border border-red-100 dark:border-red-900 rounded-lg text-xs font-semibold flex items-center gap-2 justify-center">
                  <i class="fa-solid fa-circle-exclamation text-sm text-red-500"></i>
                  <span>{{ message }}</span>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/{{ short_code }}" method="POST" class="space-y-4 text-left">
            <div>
                <label class="block text-xs font-semibold uppercase text-gray-500 dark:text-gray-400 mb-1.5 pl-1">Enter Link Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-key"></i>
                    </span>
                    <input type="password" name="link_password" required placeholder="••••••••" 
                           class="w-full pl-9 pr-4 py-2.5 bg-gray-50 dark:bg-[#334155] border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition shadow-sm">
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg flex items-center justify-center gap-2 transition shadow-md text-sm">
                <i class="fa-solid fa-unlock-keyhole"></i> Unlock & Redirect
            </button>
        </form>
    </div>

</body>
</html>
